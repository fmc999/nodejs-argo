<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON VOID // 霓虹虚空</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
/* ========== 全局重置 & 变量 ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0a0a0f;
  --bg-deeper: #050508;
  --neon-cyan: #00f5ff;
  --neon-purple: #b026ff;
  --neon-orange: #ff2a6d;
  --neon-green: #39ff14;
  --neon-gold: #ffd700;
  --glow-cyan: 0 0 7px #00f5ff, 0 0 20px #00f5ff, 0 0 60px #00f5ff;
  --glow-purple: 0 0 7px #b026ff, 0 0 20px #b026ff, 0 0 60px #b026ff;
  --glow-orange: 0 0 7px #ff2a6d, 0 0 20px #ff2a6d, 0 0 40px #ff2a6d;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  font-family: 'Rajdhani', sans-serif;
  color: #fff;
  cursor: none;
  user-select: none;
}

/* ========== Canvas 层 ========== */
#particleCanvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; z-index: 1;
}
#trailCanvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; z-index: 10;
  pointer-events: none;
}

/* ========== 主内容层 ========== */
.main-stage {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  z-index: 5;
  pointer-events: none;
}

/* ---------- 霓虹核心区 ---------- */
.neon-core {
  position: relative;
  width: 340px; height: 340px;
  display: flex; align-items: center; justify-content: center;
}

/* 核心发光球体 */
.core-orb {
  position: absolute;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%,
    rgba(255,255,255,0.9) 0%,
    var(--neon-cyan) 25%,
    var(--neon-purple) 55%,
    transparent 70%);
  box-shadow:
    0 0 30px var(--neon-cyan),
    0 0 80px var(--neon-cyan),
    0 0 140px var(--neon-purple),
    inset 0 0 30px rgba(255,255,255,0.3);
  animation: pulse 3s ease-in-out infinite;
  will-change: transform, box-shadow;
}

/* 光环 - 外层 */
.ring-outer {
  position: absolute;
  width: 300px; height: 300px;
  border: 2px solid rgba(0,245,255,0.3);
  border-radius: 50%;
  animation: spin-slow 20s linear infinite;
  box-shadow: 0 0 15px rgba(0,245,255,0.15), inset 0 0 15px rgba(0,245,255,0.05);
}
.ring-outer::before {
  content: ''; position: absolute;
  top: -4px; left: 50%;
  width: 8px; height: 8px;
  background: var(--neon-cyan);
  border-radius: 50%;
  box-shadow: var(--glow-cyan);
}

/* 光环 - 中层 */
.ring-mid {
  position: absolute;
  width: 240px; height: 240px;
  border: 1.5px solid rgba(176,38,255,0.4);
  border-radius: 50%;
  animation: spin-mid 12s linear infinite reverse;
  box-shadow: 0 0 12px rgba(176,38,255,0.2), inset 0 0 12px rgba(176,38,255,0.06);
}
.ring-mid::before {
  content: ''; position: absolute;
  bottom: -3px; right: 20%;
  width: 6px; height: 6px;
  background: var(--neon-purple);
  border-radius: 50%;
  box-shadow: var(--glow-purple);
}

/* 光环 - 内层 */
.ring-inner {
  position: absolute;
  width: 170px; height: 170px;
  border: 1px solid rgba(255,42,109,0.35);
  border-radius: 50%;
  animation: spin-fast 8s linear infinite;
  box-shadow: 0 0 10px rgba(255,42,109,0.15), inset 0 0 10px rgba(255,42,109,0.04);
}

/* 装饰性虚线环 */
.ring-dashed {
  position: absolute;
  width: 330px; height: 330px;
  border: 1px dashed rgba(57,255,20,0.15);
  border-radius: 50%;
  animation: spin-slow 30s linear infinite reverse;
}

/* ---------- Glitch 标题 ---------- */
.glitch-container {
  position: relative;
  margin-top: 220px;
  text-align: center;
  pointer-events: auto;
}

.glitch-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(2.8rem, 9vw, 7rem);
  font-weight: 900;
  letter-spacing: 0.15em;
  color: var(--neon-cyan);
  text-shadow:
    0 0 7px var(--neon-cyan),
    0 0 25px var(--neon-cyan),
    0 0 60px var(--neon-cyan),
    0 0 100px var(--neon-purple);
  position: relative;
  display: inline-block;
  animation: titleFloat 4s ease-in-out infinite;
}

/* Glitch 伪元素层 */
.glitch-title::before,
.glitch-title::after {
  content: attr(data-text);
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  font-family: 'Orbitron', monospace;
  font-size: inherit; font-weight: inherit;
  letter-spacing: inherit;
  opacity: 0.85;
}

.glitch-title::before {
  color: var(--neon-orange);
  z-index: -1;
  clip-path: inset(0 0 95% 0);
  animation: glitch-1 3s infinite linear alternate-reverse;
}

.glitch-title::after {
  color: var(--neon-green);
  z-index: -2;
  clip-path: inset(70% 0 0 0);
  animation: glitch-2 3s infinite linear alternate-reverse;
}

/* 副标题 */
.sub-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(0.8rem, 2vw, 1.3rem);
  font-weight: 300;
  letter-spacing: 0.6em;
  color: rgba(176,38,255,0.7);
  margin-top: 12px;
  text-transform: uppercase;
  animation: fadeInUp 2s ease-out both;
  animation-delay: 1.5s;
  text-shadow: 0 0 10px rgba(176,38,255,0.5);
}

/* 打字机光标 */
.type-cursor {
  display: inline-block;
  width: 3px; height: 1em;
  background: var(--neon-cyan);
  margin-left: 4px;
  vertical-align: middle;
  animation: blink 0.8s step-end infinite;
  box-shadow: 0 0 8px var(--neon-cyan);
}

/* ---------- 几何漂浮层 ---------- */
.geo-layer {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 3;
  pointer-events: none;
  perspective: 1000px;
}

.geo-shape {
  position: absolute;
  border-style: solid;
  opacity: 0;
  animation: geoFadeIn 1.5s ease forwards;
  will-change: transform;
}

/* 立方体 */
.geo-cube {
  width: 60px; height: 60px;
  border-color: rgba(0,245,255,0.25);
  border-width: 1px;
  transform-style: preserve-3d;
  animation: geoFadeIn 1.5s ease forwards, floatCube 12s ease-in-out infinite;
  top: 12%; left: 8%;
}
.geo-cube::before {
  content: ''; position: absolute;
  inset: 8px;
  border: 1px solid rgba(0,245,255,0.15);
  transform: translateZ(20px);
}

/* 八面体风格（菱形） */
.geo-diamond {
  width: 48px; height: 48px;
  border-color: rgba(176,38,255,0.3);
  border-width: 1px;
  transform: rotate(45deg);
  animation: geoFadeIn 1.8s ease forwards, floatDiamond 10s ease-in-out infinite;
  top: 18%; right: 10%;
}
.geo-diamond::before {
  content: ''; position: absolute;
  inset: 6px;
  border: 1px solid rgba(176,38,255,0.12);
}

/* 圆环 */
.geo-ring {
  width: 80px; height: 80px;
  border-color: rgba(255,42,109,0.2);
  border-width: 1.5px;
  border-radius: 50%;
  animation: geoFadeIn 2s ease forwards, floatRing 15s ease-in-out infinite;
  bottom: 22%; left: 12%;
}
.geo-ring::before {
  content: ''; position: absolute;
  inset: 10px;
  border: 1px solid rgba(255,42,109,0.1);
  border-radius: 50%;
}

/* 三角形 */
.geo-tri {
  width: 0; height: 0;
  border: 0 solid transparent;
  animation: geoFadeIn 1.6s ease forwards, floatTri 14s ease-in-out infinite;
  bottom: 28%; right: 14%;
  filter: drop-shadow(0 0 6px rgba(57,255,20,0.3));
}
.geo-tri::before {
  content: ''; position: absolute;
  border-left: 32px solid transparent;
  border-right: 32px solid transparent;
  border-bottom: 56px solid rgba(57,255,20,0.15);
}

/* 十字线 */
.geo-cross {
  width: 50px; height: 50px;
  animation: geoFadeIn 2.2s ease forwards, floatCross 11s ease-in-out infinite;
  top: 65%; left: 45%;
}
.geo-cross::before, .geo-cross::after {
  content: ''; position: absolute;
  background: rgba(255,215,0,0.2);
}
.geo-cross::before { width: 100%; height: 1px; top: 50%; }
.geo-cross::after { width: 1px; height: 100%; left: 50%; }

/* 六边形网格装饰 */
.hex-grid {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%; height: 180px;
  z-index: 2;
  pointer-events: none;
  opacity: 0.04;
  background-image:
    linear-gradient(30deg, var(--neon-cyan) 12%, transparent 12.5%, transparent 87%, var(--neon-cyan) 87.5%, var(--neon-cyan)),
    linear-gradient(150deg, var(--neon-cyan) 12%, transparent 12.5%, transparent 87%, var(--neon-cyan) 87.5%, var(--neon-cyan)),
    linear-gradient(30deg, var(--neon-cyan) 12%, transparent 12.5%, transparent 87%, var(--neon-cyan) 87.5%, var(--neon-cyan)),
    linear-gradient(150deg, var(--neon-cyan) 12%, transparent 12.5%, transparent 87%, var(--neon-cyan) 87.5%, var(--neon-cyan));
  background-size: 80px 140px;
  background-position: 0 0, 0 0, 40px 70px, 40px 70px;
}

/* ---------- 自定义光标 ---------- */
.custom-cursor {
  position: fixed;
  width: 20px; height: 20px;
  border: 2px solid var(--neon-cyan);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, border-color 0.1s;
  mix-blend-mode: difference;
  will-change: transform;
}
.custom-cursor::before {
  content: ''; position: absolute;
  top: 50%; left: 50%;
  width: 5px; height: 5px;
  background: var(--neon-cyan);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
}
.custom-cursor::after {
  content: ''; position: absolute;
  top: 50%; left: 50%;
  width: 36px; height: 36px;
  border: 1px solid rgba(0,245,255,0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: cursorRing 2s ease-in-out infinite;
}
.custom-cursor.active {
  width: 40px; height: 40px;
  border-color: var(--neon-orange);
}

/* ---------- 频谱条 ---------- */
.spectrum-wrap {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 3px;
  align-items: flex-end;
  z-index: 8;
  pointer-events: none;
  height: 60px;
}
.spectrum-bar {
  width: 3px;
  min-height: 4px;
  background: linear-gradient(to top, var(--neon-cyan), var(--neon-purple));
  border-radius: 2px 2px 0 0;
  box-shadow: 0 0 6px rgba(0,245,255,0.4);
  transform-origin: bottom;
  animation: spectrumBounce var(--dur, 200ms) ease-in-out infinite alternate;
  animation-delay: var(--delay, 0ms);
  will-change: transform;
}

/* ---------- CRT 扫描线覆盖层 ---------- */
.crt-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 100;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  animation: scanlineScroll 8s linear infinite;
}
/* CRT 边缘暗角 */
.crt-vignette {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 99;
  pointer-events: none;
  background: radial-gradient(
    ellipse at center,
    transparent 50%,
    rgba(0,0,0,0.4) 100%
  );
}

/* ---------- 点击闪白效果 ---------- */
.flash-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 200;
  pointer-events: none;
  background: white;
  opacity: 0;
  transition: opacity 30ms ease-out;
}

/* ---------- 冲击波 ---------- */
.shockwave {
  position: fixed;
  border: 2px solid var(--neon-cyan);
  border-radius: 50%;
  pointer-events: none;
  z-index: 15;
  animation: shockwaveExpand 0.8s ease-out forwards;
  box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 20px rgba(0,245,255,0.1);
}

/* ---------- 角落装饰文字 ---------- .corner-deco {
  position: fixed;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(0,245,255,0.2);
  z-index: 6;
  pointer-events: none;
}
.corner-tl { top: 24px; left: 28px; }
.corner-tr { top: 24px; right: 28px; text-align: right; }
.corner-bl { bottom: 24px; left: 28px; }
.corner-br { bottom: 24px; right: 28px; text-align: right; }

.corner-line {
  display: block;
  width: 40px; height: 1px;
  background: linear-gradient(90deg, var(--neon-cyan), transparent);
  margin-bottom: 6px;
}
.corner-tr .corner-line,
.corner-br .corner-line {
  background: linear-gradient(-90deg, var(--neon-cyan), transparent);
  margin-left: auto; margin-bottom: 6px;
}

/* ========== 动画关键帧 ========== */

@keyframes pulse {
  0%, 100% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.16); filter: brightness(1.3); }
}

@keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes spin-mid { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes spin-fast { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

@keyframes glitch-1 {
  0%   { clip-path: inset(0 0 95% 0); transform: translate(0); }
  10%  { clip-path: inset(20% 0 50% 0); transform: translate(-4px, 2px); }
  20%  { clip-path: inset(60% 0 10% 0); transform: translate(4px, -1px); }
  30%  { clip-path: inset(10% 0 70% 0); transform: translate(-2px, 3px); }
  40%  { clip-path: inset(80% 0 5% 0); transform: translate(3px, -2px); }
  50%  { clip-path: inset(0 0 90% 0); transform: translate(0); }
  51%  { clip-path: inset(0 0 100% 0); transform: translate(0); }
  100% { clip-path: inset(0 0 100% 0); transform: translate(0); }
}

@keyframes glitch-2 {
  0%   { clip-path: inset(70% 0 0 0); transform: translate(0); }
  10%  { clip-path: inset(30% 0 40% 0); transform: translate(3px, -2px); }
  20%  { clip-path: inset(5% 0 80% 0); transform: translate(-3px, 1px); }
  30%  { clip-path: inset(50% 0 20% 0); transform: translate(2px, -3px); }
  40%  { clip-path: inset(15% 0 65% 0); transform: translate(-2px, 2px); }
  50%  { clip-path: inset(90% 0 0 0); transform: translate(0); }
  51%  { clip-path: inset(100% 0 0 0); transform: translate(0); }
  100% { clip-path: inset(100% 0 0 0); transform: translate(0); }
}

@keyframes titleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes geoFadeIn { to { opacity: 1; } }

@keyframes floatCube {
  0%, 100% { transform: translateY(0) rotate(0deg) rotateX(0deg) rotateY(0deg); }
  25%      { transform: translateY(-25px) rotate(90deg) rotateX(15deg) rotateY(30deg); }
  50%      { transform: translateY(-10px) rotate(180deg) rotateX(-10deg) rotateY(60deg); }
  75%      { transform: translateY(-30px) rotate(270deg) rotateX(20deg) rotateY(-20deg); }
}

@keyframes floatDiamond {
  0%, 100% { transform: rotate(45deg) translateY(0) scale(1); }
  33%      { transform: rotate(55deg) translateY(-35px) scale(1.08); }
  66%      { transform: rotate(35deg) translateY(-15px) scale(0.94); }
}

@keyframes floatRing {
  0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
  33%      { transform: translateY(-20px) rotate(10deg) scale(1.06); }
  66%      { transform: translateY(-8px) rotate(-8deg) scale(0.96); }
}

@keyframes floatTri {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-28px) rotate(15deg); }
}

@keyframes floatCross {
  0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
  50%      { transform: translateY(-18px) rotate(90deg) scale(1.1); }
}

@keyframes cursorRing {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
  50%      { transform: translate(-50%, -50%) scale(1.6); opacity: 0.1; }
}

@keyframes spectrumBounce {
  0%   { transform: scaleY(0.15); }
  100% { transform: scaleY(var(--h, 1)); }
}

@keyframes scanlineScroll {
  from { background-position: 0 0; }
  to   { background-position: 0 100vh; }
}

@keyframes shockwaveExpand {
  0%   { width: 0; height: 0; opacity: 1; border-width: 3px; }
  100% { width: 500px; height: 500px; opacity: 0; border-width: 0.5px; }
}

/* ========== 响应式适配 ========== */
@media (max-width: 768px) {
  .neon-core { width: 240px; height: 240px; }
  .core-orb { width: 80px; height: 80px; }
  .ring-outer { width: 210px; height: 210px; }
  .ring-mid { width: 168px; height: 168px; }
  .ring-inner { width: 120px; height: 120px; }
  .ring-dashed { width: 230px; height: 230px; }
  .glitch-container { margin-top: 160px; }
  .geo-shape { display: none; }
  .corner-deco { font-size: 8px; }
  .spectrum-bar { width: 2px; }
}

@media (max-width: 480px) {
  .neon-core { width: 180px; height: 180px; }
  .core-orb { width: 60px; height: 60px; }
  .ring-outer { width: 160px; height: 160px; }
  .ring-mid { width: 128px; height: 128px; }
  .ring-inner { width: 92px; height: 92px; }
  .ring-dashed { width: 174px; height: 174px; }
  .glitch-container { margin-top: 120px; }
}
</style>
</head>
<body>

<!-- ====== 背景粒子画布 ====== -->
<canvas id="particleCanvas"></canvas>

<!-- ====== 光标尾迹画布 ====== -->
<canvas id="trailCanvas"></canvas>

<!-- ====== 几何漂浮层 ====== -->
<div class="geo-layer">
  <div class="geo-shape geo-cube"></div>
  <div class="geo-shape geo-diamond"></div>
  <div class="geo-shape geo-ring"></div>
  <div class="geo-shape geo-tri"></div>
  <div class="geo-shape geo-cross"></div>
</div>

<!-- ====== 主舞台：霓虹核心 + 标题 ====== -->
<div class="main-stage">
  <div class="neon-core">
    <div class="ring-dashed"></div>
    <div class="ring-outer"></div>
    <div class="ring-mid"></div>
    <div class="ring-inner"></div>
    <div class="core-orb"></div>
  </div>
  <div class="glitch-container">
    <div class="glitch-title" data-text="NEON VOID">NEON VOID</div>
    <div class="sub-title">IMMERSIVE VISUAL EXPERIENCE<span class="type-cursor"></span></div>
  </div>
</div>

<!-- ====== 六边形底部网格 ====== -->
<div class="hex-grid"></div>

<!-- ====== 频谱条 ====== -->
<div class="spectrum-wrap" id="spectrum"></div>

<!-- ====== 角落装饰 ====== -->
<div class="corner-deco corner-tl"><span class="corner-line"></span>SYS.ONLINE</div>
<div class="corner-deco corner-tr"><span class="corner-line"></span>v2.077</div>
<div class="corner-deco corner-bl">PARTICLES:<span id="pCount">2000</span></div>
<div class="corner-deco corner-br">FPS:<span id="fpsDisplay">60</span></div>

<!-- ====== CRT 效果层 ====== -->
<div class="crt-vignette"></div>
<div class="crt-overlay"></div>

<!-- ====== 点击闪白 ====== -->
<div class="flash-overlay" id="flashOverlay"></div>

<!-- ====== 自定义光标 ====== -->
<div class="custom-cursor" id="cursor"></div>

<script>
// ============================================================
//  NEON VOID - 霓虹虚空 · 全特效引擎
// ============================================================

(function() {
  'use strict';

  // ---- 配置参数 ----
  const CFG = {
    particleCount: 2000,
    maxDistance: 110,
    mouseRadius: 150,
    mouseForce: 0.018,
    friction: 0.977,
    baseSpeed: 0.35,
    trailLength: 35,
    spectrumBars: 64,
    colors: ['#00f5ff', '#b026ff', '#ff2a6d', '#39ff14', '#ffd700']
  };

  // ---- 设备性能自适应 ----
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const cores = navigator.hardwareConcurrency || 4;
  if (isMobile || cores <= 4) CFG.particleCount = 700;
  else if (cores <= 8) CFG.particleCount = 1500;

  document.getElementById('pCount').textContent = CFG.particleCount;

  // ---- DOM 引用 ----
  const pCanvas = document.getElementById('particleCanvas');
  const tCanvas = document.getElementById('trailCanvas');
  const pCtx = pCanvas.getContext('2d');
  const tCtx = tCanvas.getContext('2d');
  const cursorEl = document.getElementById('cursor');
  const flashEl = document.getElementById('flashOverlay');
  const spectrumEl = document.getElementById('spectrum');
  const fpsEl = document.getElementById('fpsDisplay');

  let W, H;
  let mouse = { x: -9999, y: -9999, active: false };
  let hueOffset = 0;
  let frameCount = 0;
  let lastFpsTime = performance.now();
  let fps = 60;
  let isPageVisible = true;

  // ============================================================
  //  1. 粒子系统
  // ============================================================
  const particles = [];

  class Particle {
    constructor() { this.reset(true); }
    reset(initial = false) {
      this.x = Math.random() * W;
      this.y = initial ? Math.random() * H : H + Math.random() * 100;
      this.vx = (Math.random() - 0.5) * CFG.baseSpeed;
      this.vy = (Math.random() - 0.5) * CFG.baseSpeed - 0.2;
      this.radius = Math.random() * 1.8 + 0.6;
      this.alpha = Math.random() * 0.6 + 0.3;
      // 基于位置计算色相
      this.hue = ((this.x / W) * 180 + (this.y / H) * 180) % 360;
    }
    update() {
      // 鼠标引力/斥力
      if (mouse.active) {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        if (dist < CFG.mouseRadius) {
          const force = (CFG.mouseRadius - dist) / CFG.mouseRadius;
          const angle = Math.atan2(dy, dx);
          this.vx += Math.cos(angle) * force * CFG.mouseForce * 60;
          this.vy += Math.sin(angle) * force * CFG.mouseForce * 60;
        }
      }
      // 物理更新
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= CFG.friction;
      this.vy *= CFG.friction;
      // 边界循环
      if (this.x < -50) this.x = W + 50;
      if (this.x > W + 50) this.x = -50;
      if (this.y < -50) this.y = H + 50;
      if (this.y > H + 50) this.reset();
      // 色相随时间微变
      this.hue = (this.hue + 0.1) % 360;
    }
    draw(ctx) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 100%, 65%, ${this.alpha})`;
      ctx.fill();
    }
  }

  function initParticles() {
    particles.length = 0;
    for (let i = 0; i < CFG.particleCount; i++) {
      particles.push(new Particle());
    }
  }

  function drawConnections(ctx) {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d = dx * dx + dy * dy;
        if (d < CFG.maxDistance * CFG.maxDistance) {
          const dist = Math.sqrt(d);
          const alpha = (1 - dist / CFG.maxDistance) * 0.12;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(0, 245, 255, ${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  // ============================================================
  //  2. 光标尾迹系统
  // ============================================================
  const trailPoints = [];

  function updateTrail() {
    if (!mouse.active) return;
    trailPoints.push({ x: mouse.x, y: mouse.y, age: 0 });
    if (trailPoints.length > CFG.trailLength) trailPoints.shift();
    trailPoints.forEach(p => p.age++);
  }

  function drawTrail(ctx) {
    if (trailPoints.length < 2) return;
    ctx.clearRect(0, 0, W, H);
    for (let i = 1; i < trailPoints.length; i++) {
      const p0 = trailPoints[i - 1];
      const p1 = trailPoints[i];
      const progress = i / trailPoints.length;
      const hue = (hueOffset + progress * 120) % 360;
      const alpha = progress * 0.7;
      const width = progress * 4 + 0.5;
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
    // 尾迹头部发光点
    if (trailPoints.length > 0) {
      const head = trailPoints[trailPoints.length - 1];
      const grd = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, 15);
      grd.addColorStop(0, `hsla(${hueOffset}, 100%, 70%, 0.8)`);
      grd.addColorStop(1, `hsla(${hueOffset}, 100%, 70%, 0)`);
      ctx.beginPath();
      ctx.arc(head.x, head.y, 15, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }
  }

  // ============================================================
  //  3. 点击冲击波系统
  // ============================================================
  const shockwaves = [];

  function createShockwave(x, y) {
    // DOM 冲击波
    const sw = document.createElement('div');
    sw.className = 'shockwave';
    sw.style.left = x + 'px';
    sw.style.top = y + 'px';
    sw.style.transform = 'translate(-50%, -50%)';
    document.body.appendChild(sw);
    setTimeout(() => sw.remove(), 800);

    // 粒子喷射
    const burstCount = isMobile ? 30 : 60;
    for (let i = 0; i < burstCount; i++) {
      const angle = (Math.PI * 2 / burstCount) * i + Math.random() * 0.5;
      const speed = 3 + Math.random() * 6;
      shockwaves.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.015 + Math.random() * 0.02,
        radius: 1.5 + Math.random() * 2.5,
        hue: Math.random() * 360
      });
    }

    // 屏幕闪白
    flashEl.style.opacity = '0.5';
    setTimeout(() => flashEl.style.opacity = '0', 50);
    setTimeout(() => flashEl.style.opacity = '0.15', 100);
    setTimeout(() => flashEl.style.opacity = '0', 150);

    // 核心爆发反馈
    const orb = document.querySelector('.core-orb');
    orb.style.transition = 'transform 0.15s, box-shadow 0.15s';
    orb.style.transform = 'scale(1.4)';
    orb.style.boxShadow = '0 0 60px #00f5ff, 0 0 120px #b026ff, 0 0 200px #ff2a6d';
    setTimeout(() => {
      orb.style.transform = '';
      orb.style.boxShadow = '';
    }, 300);
  }

  function updateShockwaves(ctx) {
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const s = shockwaves[i];
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= 0.97;
      s.vy *= 0.97;
      s.life -= s.decay;
      if (s.life <= 0) { shockwaves.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius * s.life, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${s.hue}, 100%, 65%, ${s.life})`;
      ctx.fill();
      // 发光拖尾
      ctx.beginPath();
      ctx.arc(s.x - s.vx * 2, s.y - s.vy * 2, s.radius * s.life * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${s.hue}, 100%, 65%, ${s.life * 0.3})`;
      ctx.fill();
    }
  }

  // ============================================================
  //  4. 频谱条生成
  // ============================================================
  function initSpectrum() {
    spectrumEl.innerHTML = '';
    for (let i = 0; i < CFG.spectrumBars; i++) {
      const bar = document.createElement('div');
      bar.className = 'spectrum-bar';
      bar.style.setProperty('--delay', `${i * 30}ms`);
      bar.style.setProperty('--dur', `${120 + Math.random() * 280}ms`);
      bar.style.setProperty('--h', `${0.25 + Math.random() * 0.75}`);
      spectrumEl.appendChild(bar);
    }
  }

  // 周期性随机化频谱高度
  function randomizeSpectrum() {
    const bars = spectrumEl.children;
    for (let i = 0; i < bars.length; i++) {
      bars[i].style.setProperty('--h', `${0.1 + Math.random() * 0.9}`);
      bars[i].style.setProperty('--dur', `${100 + Math.random() * 250}ms`);
    }
  }
  setInterval(randomizeSpectrum, 400);

  // ============================================================
  //  5. 尺寸管理
  // ============================================================
  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    pCanvas.width = W;
    pCanvas.height = H;
    tCanvas.width = W;
    tCanvas.height = H;
    initParticles();
  }

  // ============================================================
  //  6. 主渲染循环
  // ============================================================
  function animate() {
    if (!isPageVisible) { requestAnimationFrame(animate); return; }

    // FPS 计算
    frameCount++;
    const now = performance.now();
    if (now - lastFpsTime >= 1000) {
      fps = frameCount;
      fpsEl.textContent = fps;
      frameCount = 0;
      lastFpsTime = now;
    }

    // 色相旋转
    hueOffset = (hueOffset + 0.5) % 360;

    // --- 粒子层 ---
    pCtx.clearRect(0, 0, W, H);
    // 绘制连线（每帧只采样部分以优化）
    if (particles.length < 1000) {
      drawConnections(pCtx);
    } else {
      // 大量粒子时降采样绘制连线
      const step = Math.ceil(particles.length / 600);
      for (let i = 0; i < particles.length; i += step) {
        for (let j = i + 1; j < particles.length; j += step) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d = dx * dx + dy * dy;
          if (d < CFG.maxDistance * CFG.maxDistance) {
            const dist = Math.sqrt(d);
            const alpha = (1 - dist / CFG.maxDistance) * 0.1;
            pCtx.beginPath();
            pCtx.moveTo(particles[i].x, particles[i].y);
            pCtx.lineTo(particles[j].x, particles[j].y);
            pCtx.strokeStyle = `rgba(0, 245, 255, ${alpha})`;
            pCtx.lineWidth = 0.4;
            pCtx.stroke();
          }
        }
      }
    }
    // 更新并绘制粒子
    for (const p of particles) { p.update(); p.draw(pCtx); }

    // --- 冲击波 ---
    updateShockwaves(pCtx);

    // --- 尾迹层 ---
    updateTrail();
    drawTrail(tCtx);

    requestAnimationFrame(animate);
  }

  // ============================================================
  //  7. 事件监听
  // ============================================================
  window.addEventListener('resize', resize);

  document.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top = e.clientY + 'px';

    // 动态光标颜色
    const h = (hueOffset) % 360;
    cursorEl.style.borderColor = `hsl(${h}, 100%, 65%)`;
    cursorEl.style.setProperty('--cursor-hue', h);
  });

  document.addEventListener('mousedown', () => {
    cursorEl.classList.add('active');
  });

  document.addEventListener('mouseup', () => {
    cursorEl.classList.remove('active');
  });

  document.addEventListener('click', (e) => {
    createShockwave(e.clientX, e.clientY);
  });

  document.addEventListener('mouseenter', () => {
    cursorEl.style.opacity = '1';
  });

  document.addEventListener('mouseleave', () => {
    mouse.active = false;
    mouse.x = -9999;
    mouse.y = -9999;
    cursorEl.style.opacity = '0';
    trailPoints.length = 0;
  });

  // 页面可见性
  document.addEventListener('visibilitychange', () => {
    isPageVisible = !document.hidden;
  });

  // 触摸支持
  document.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    mouse.x = t.clientX;
    mouse.y = t.clientY;
    mouse.active = true;
    cursorEl.style.left = t.clientX + 'px';
    cursorEl.style.top = t.clientY + 'px';
    cursorEl.style.opacity = '1';
  }, { passive: true });

  document.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    createShockwave(t.clientX, t.clientY);
  }, { passive: true });

  document.addEventListener('touchend', () => {
    mouse.active = false;
  });

  // ============================================================
  //  8. 启动
  // ============================================================
  resize();
  initSpectrum();
  animate();

  // 初始入场动画：标题打字机效果
  const titleEl = document.querySelector('.glitch-title');
  const fullText = 'NEON VOID';
  titleEl.textContent = '';
  let charIdx = 0;
  function typeWriter() {
    if (charIdx < fullText.length) {
      titleEl.textContent += fullText[charIdx];
      titleEl.setAttribute('data-text', titleEl.textContent);
      charIdx++;
      setTimeout(typeWriter, 100 + Math.random() * 100);
    }
  }
  setTimeout(typeWriter, 600);

})();
</script>
</body>
</html>
