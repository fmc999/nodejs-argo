<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Hole Experience - Apple Style</title>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* --- Apple 风格基础设置 --- */
        :root {
            --bg-color: #000000;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --accent-blue: #2997ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止滚动条 */
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-primary);
        }

        /* --- 3D Canvas 背景 --- */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            outline: none;
        }

        /* --- 内容层 (Apple UI) --- */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            pointer-events: none; /* 让鼠标事件穿透到 Canvas */
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            max-width: 600px;
            line-height: 1.4;
        }

        .cta-button {
            pointer-events: auto; /* 恢复按钮点击 */
            display: inline-block;
            padding: 12px 32px;
            background-color: var(--accent-blue);
            color: white;
            border-radius: 980px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .cta-button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        /* --- 滚动提示 --- */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- 移动端适配 --- */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1rem; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <!-- 3D 背景容器 -->
    <div id="canvas-container"></div>

    <!-- 前景内容 -->
    <div class="content">
        <h1>Event Horizon.</h1>
        <p>探索未知的边界。在极致的黑暗中寻找光的起源。</p>
        <a href="#" class="cta-button">了解更多</a>
    </div>

    <div class="scroll-hint">Scroll to explore</div>

    <script>
        // --- 初始化 Three.js 场景 ---
        const scene = new THREE.Scene();
        
        // 添加一点环境雾，增加深邃感
        scene.fog = new THREE.FogExp2(0x000000, 0.03);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30; // 相机距离黑洞的距离

        const renderer = new THREE.WebGLRenderer({ 
            alpha: true, // 透明背景，让 CSS 颜色透过来（虽然这里主要是黑色）
            antialias: true // 开启抗锯齿
        });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- 创建粒子系统 (黑洞吸积盘) ---
        const particleCount = 6000; // 粒子数量，越多越流畅但性能越低
        
        // 使用 BufferGeometry 提高性能
        const geometry = new THREE.BufferGeometry();
        const positions = [];
        const colors = [];

        for (let i = 0; i < particleCount; i++) {
            // 随机生成位置，形成一个球体或扁平的盘状分布
            // 这里我们做一个扁平的盘状结构，模拟吸积盘
            const radius = Math.random() * 25 + 10; // 半径范围 10-35
            const theta = Math.random() * Math.PI * 2;
            
            // 稍微压扁一点，形成盘状
            const phi = (Math.PI / 2) - (Math.random() * 0.4); 

            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta); // 垂直方向稍微压缩
            const z = radius * Math.cos(phi);

            positions.push(x, y, z);

            // 颜色：从中心的亮白到边缘的深蓝/黑
            const colorIntensity = (25 - radius / 3.5) / 255; 
            const r = Math.max(0, 180 * colorIntensity);
            const g = Math.max(0, 160 * colorIntensity);
            const b = Math.min(255, 255 * (1 - colorIntensity)); // 边缘偏蓝

            colors.push(r, g, b);
        }

        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

        // 创建粒子材质
        const material = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true, // 使用顶点颜色
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending, // 叠加混合模式，让中心更亮
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- 交互逻辑 (鼠标移动影响视角) ---
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // --- 动画循环 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // 1. 粒子自转与吸积效果
            particles.rotation.y += 0.002; // 整体缓慢旋转
            
            // 2. 鼠标交互 (平滑过渡)
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;

            particles.rotation.x += 0.05 * (targetY - particles.rotation.x);
            particles.rotation.y += 0.05 * (targetX - particles.rotation.y);

            // 3. 模拟吸积盘：粒子向中心移动
            const positionsArray = particles.geometry.attributes.position.array;
            
            for(let i=1; i<positionsArray.length; i+=3) {
                let x = positionsArray[i];
                let y = positionsArray[i+1];
                let z = positionsArray[i+2];

                // 计算距离中心的距离 (欧几里得距离)
                const distanceFromCenter = Math.sqrt(x*x + y*y + z*z);

                // 只有当粒子在某个范围内时，才向中心移动
                if(distanceFromCenter > 5 && distanceFromCenter < 20) {
                    // 简单的向内螺旋运动逻辑
                    // 我们让 Y 轴（垂直方向）的粒子向下沉，模拟引力
                    y -= 0.1; 
                    
                    // 稍微增加一点旋转速度，产生拖尾感
                    const angle = Math.atan2(x, z);
                    x += Math.cos(angle) * 0.05;
                    z += Math.sin(angle) * 0.05;

                    positionsArray[i] = x;
                    positionsArray[i+1] = y;
                    positionsArray[i+2] = z;
                }
            }

            // 更新顶点数据并通知 Three.js
            particles.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        animate();

        // --- 窗口大小调整适配 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
